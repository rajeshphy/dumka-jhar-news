sources:
  local:
    # ======================================================
    # DUMKA — PRIMARY LOCAL COVERAGE
    # High-volume enough to justify separate English and
    # Hindi Google News searches.
    # ======================================================

    - name: Google News - Dumka
      type: rss
      weight: 4
      url: "https://news.google.com/rss/search?q=Dumka%20Jharkhand%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

    - name: Google News - Dumka Hindi
      type: rss
      weight: 4
      url: "https://news.google.com/rss/search?q=%E0%A4%A6%E0%A5%81%E0%A4%AE%E0%A4%95%E0%A4%BE%20%E0%A4%9D%E0%A4%BE%E0%A4%B0%E0%A4%96%E0%A4%82%E0%A4%A1%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"

    - name: Google News - Dumka Live News
      type: rss
      weight: 5
      url: "https://news.google.com/rss/search?q=%28%22Dumka%20Live%20News%22%20OR%20%22Dumka%20Live%22%20OR%20%22%E0%A4%A6%E0%A5%81%E0%A4%AE%E0%A4%95%E0%A4%BE%20%E0%A4%B2%E0%A4%BE%E0%A4%87%E0%A4%B5%22%29%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"

    # ======================================================
    # SANTHAL PARGANA — SECONDARY REGIONAL COVERAGE
    # One regional feed is sufficient. Separate feeds for
    # every district create excessive duplication.
    # ======================================================

    - name: Google News - Santhal Pargana
      type: rss
      weight: 2
      url: "https://news.google.com/rss/search?q=%22Santhal%20Pargana%22%20Jharkhand%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

    - name: Google News - Santhal Pargana Hindi
      type: rss
      weight: 2
      url: "https://news.google.com/rss/search?q=%22%E0%A4%B8%E0%A4%82%E0%A4%A5%E0%A4%BE%E0%A4%B2%20%E0%A4%AA%E0%A4%B0%E0%A4%97%E0%A4%A8%E0%A4%BE%22%20%E0%A4%9D%E0%A4%BE%E0%A4%B0%E0%A4%96%E0%A4%82%E0%A4%A1%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"

    # ======================================================
    # MURI–SILLI — PERSONAL-PRIORITY BIRTHPLACE REGION
    #
    # Do not use a standalone Muri feed. Muri has too few
    # articles on an ordinary day. The four-place OR query
    # gives the region enough volume while retaining local
    # relevance.
    # ======================================================

    - name: Google News - Muri Silli Region
      type: rss
      weight: 3
      url: "https://news.google.com/rss/search?q=%28Muri%20OR%20Silli%20OR%20Sonahatu%20OR%20Rahe%29%20Ranchi%20Jharkhand%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

    - name: Google News - Muri Silli Region Hindi
      type: rss
      weight: 3
      url: "https://news.google.com/rss/search?q=%28%E0%A4%AE%E0%A5%81%E0%A4%B0%E0%A5%80%20OR%20%E0%A4%AE%E0%A5%82%E0%A4%B0%E0%A5%80%20OR%20%E0%A4%B8%E0%A4%BF%E0%A4%B2%E0%A5%8D%E0%A4%B2%E0%A5%80%20OR%20%E0%A4%B8%E0%A5%8B%E0%A4%A8%E0%A4%BE%E0%A4%B9%E0%A4%BE%E0%A4%A4%E0%A5%82%20OR%20%E0%A4%B0%E0%A4%BE%E0%A4%B9%E0%A5%87%29%20%E0%A4%9D%E0%A4%BE%E0%A4%B0%E0%A4%96%E0%A4%82%E0%A4%A1%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"

    # Covers railway, Hindalco and transport reports that may
    # mention Muri without mentioning the wider locality.
    - name: Google News - Muri Railway and Hindalco
      type: rss
      weight: 3
      url: "https://news.google.com/rss/search?q=%28%22Muri%20Junction%22%20OR%20%22Hindalco%20Muri%22%20OR%20%22Ranchi%20Muri%20railway%22%29%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

  state:
    # ======================================================
    # JHARKHAND — MAIN STATEWIDE FEEDS
    # These two feeds generate sufficient statewide volume.
    # ======================================================

    - name: Google News - Jharkhand
      type: rss
      weight: 2
      url: "https://news.google.com/rss/search?q=Jharkhand%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

    - name: Google News - Jharkhand Hindi
      type: rss
      weight: 2
      url: "https://news.google.com/rss/search?q=%E0%A4%9D%E0%A4%BE%E0%A4%B0%E0%A4%96%E0%A4%82%E0%A4%A1%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"

    # ======================================================
    # RANCHI DISTRICT
    #
    # Necessary because Silli, Sonahatu, Rahe and Muri-area
    # stories are often classified by publishers as Ranchi.
    # ======================================================

    - name: Google News - Ranchi District
      type: rss
      weight: 2
      url: "https://news.google.com/rss/search?q=Ranchi%20Jharkhand%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

    - name: Google News - Ranchi District Hindi
      type: rss
      weight: 2
      url: "https://news.google.com/rss/search?q=%E0%A4%B0%E0%A4%BE%E0%A4%82%E0%A4%9A%E0%A5%80%20%E0%A4%9D%E0%A4%BE%E0%A4%B0%E0%A4%96%E0%A4%82%E0%A4%A1%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"

    # ======================================================
    # GOVERNANCE AND PUBLIC POLICY
    #
    # A narrower feed prevents major government decisions
    # from being buried under crime and city news.
    # ======================================================

    - name: Google News - Jharkhand Government
      type: rss
      weight: 3
      url: "https://news.google.com/rss/search?q=%22Jharkhand%20Government%22%20when%3A1d&hl=en-IN&gl=IN&ceid=IN:en"

    - name: Google News - Jharkhand Government Hindi
      type: rss
      weight: 3
      url: "https://news.google.com/rss/search?q=%22%E0%A4%9D%E0%A4%BE%E0%A4%B0%E0%A4%96%E0%A4%82%E0%A4%A1%20%E0%A4%B8%E0%A4%B0%E0%A4%95%E0%A4%BE%E0%A4%B0%22%20when%3A1d&hl=hi-IN&gl=IN&ceid=IN:hi"
