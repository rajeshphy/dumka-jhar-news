settings:
  # Candidate items retained before final summarisation.
  local_limit: 36
  state_limit: 36

  final_points_per_section: 5
  max_groups_per_section: 8
  min_group_score: 2
  direct_link_workers: 8

  require_ist_today: true
  max_age_hours: 30
  allow_unknown_dates: false

  # Highest-priority places:
  # 1. Dumka, where the reader currently lives
  # 2. Muri–Silli region, the reader's birthplace
  # 3. Remaining Santhal Pargana districts
  local_keywords: >-
